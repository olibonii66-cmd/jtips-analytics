<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>JTIPS Analytics</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="fixes.css" />
  <link rel="stylesheet" href="completas.css" />
</head>

<body>
  <header class="app-header">
    <div class="brand">
      <img src="/assets/jtips-logo.png" alt="JTIPS" />
      <div class="brand-copy">
        <strong>JTIPS</strong>
        <span>Analytics</span>
      </div>
    </div>

    <nav class="nav">
      <button class="active" type="button">Partidas</button>
      <button type="button">Competições</button>
      <button type="button">Times</button>
      <button type="button">Análises</button>
      <button type="button">Favoritos</button>
    </nav>

    <label class="search">
      🔎
      <input type="search" placeholder="Buscar partidas ou times..." />
    </label>
  </header>

  <main class="page">
    <section id="homePage" class="container">
      <div class="date-nav"></div>
      <div id="matchesContainer"></div>
    </section>

    <section id="statsPage" class="container hidden">
      <button class="back-btn" type="button" onclick="showHome()">← Voltar para jogos</button>

      <article class="match-header">
        <div class="match-meta">
          <strong>Partida selecionada</strong><br />
          Selecione uma partida na lista<br />
          Dados via API
        </div>

        <div class="versus">
          <div>
            <div class="big-badge">A</div>
            <strong>Time A</strong>
          </div>

          <div class="vs">VS</div>

          <div>
            <div class="big-badge">B</div>
            <strong>Time B</strong>
          </div>
        </div>

        <div class="pre-badge">📅 PRÉ-JOGO</div>
      </article>

      <div class="tabs">
        <button class="tab active" type="button" data-tab="completas">Completas</button>
        <button class="tab" type="button" data-tab="gols">Gols</button>
        <button class="tab" type="button" data-tab="escanteios">Escanteios</button>
        <button class="tab" type="button" data-tab="cartoes">Cartões</button>
        <button class="tab" type="button" data-tab="chutes">Chutes</button>
        <button class="tab" type="button" data-tab="intervalo">Intervalo</button>
        <button class="tab" type="button" data-tab="jogadores">Jogadores</button>
        <button class="tab" type="button" data-tab="ia">IA / Tendências</button>
      </div>

      <div id="tabContent"></div>

      <p class="footer-note">
        ⚠️ Use gestão. O JTIPS não garante lucro. 🔞 18+ Jogo Responsável
      </p>
    </section>
  </main>

  <script src="app.js"></script>
  <script src="functional-data.js"></script>
  <script src="completas.js"></script>
</body>
</html>
